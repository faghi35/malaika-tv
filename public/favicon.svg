<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background with modern round corners, matching Malaika's dark navy -->
  <rect width="512" height="512" rx="120" fill="#001f3e"/>
  
  <!-- Stylized MTV geometric logo mark -->
  <g transform="translate(66, 146)">
    <!-- 'M': Left vertical stem (Light Sky Blue) -->
    <path d="M 0,0 L 48,0 L 48,220 L 0,220 Z" fill="#60a5fa" />
    
    <!-- 'M': Purple/Violet diagonal middle part -->
    <path d="M 48,0 L 106,120 L 164,0 L 212,0 L 132,180 L 132,220 L 80,220 L 80,180 Z" fill="#a78bfa" />
    
    <!-- 'M': Right vertical stem (Light Sky Blue) -->
    <path d="M 164,0 L 212,0 L 212,220 L 164,220 Z" fill="#60a5fa" />
    
    <!-- 'T' & 'V': Group offset -->
    <g transform="translate(230, 0)">
      <!-- 'T': Violet top horizontal bar -->
      <path d="M 0,0 L 140,0 L 140,48 L 0,48 Z" fill="#a78bfa" />
      
      <!-- 'T': Light Sky Blue vertical stem -->
      <path d="M 45,48 L 95,48 L 95,220 L 45,220 Z" fill="#60a5fa" />
      
      <!-- 'V': Violet left diagonal stroke -->
      <path d="M 150,0 L 202,0 L 260,220 L 212,220 Z" fill="#a78bfa" />
      
      <!-- 'V': Light Sky Blue right diagonal stroke -->
      <path d="M 202,0 L 250,0 L 190,220 L 150,220 Z" fill="#60a5fa" />
    </g>
  </g>
</svg>
